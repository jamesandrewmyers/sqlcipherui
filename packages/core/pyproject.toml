[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sqlcipherui-core"
version = "0.1.0"
description = "Core library for SQLCipherUI - SQLite/SQLCipher database management"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "pydantic>=2.0",
    "sqlcipher3>=0.5.4",
    "platformdirs>=4.0",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "ruff>=0.8",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sqlcipherui_core"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["sqlcipherui_core"]
