[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "sqlcipherui-api"
version = "0.1.0"
description = "FastAPI backend for SQLCipherUI - SQLite/SQLCipher database management"
requires-python = ">=3.11"
license = { text = "MIT" }
dependencies = [
    "fastapi>=0.115.0",
    "uvicorn[standard]>=0.32.0",
    "pydantic>=2.0",
    "pydantic-settings>=2.7.0",
    "websockets>=14.0",
    "sqlcipherui-core",
]

[project.optional-dependencies]
dev = [
    "pytest>=8.0",
    "pytest-asyncio>=0.24",
    "httpx>=0.28",
    "pytest-cov>=4.1",
]

[tool.hatch.build.targets.wheel]
packages = ["src/sqlcipherui_api"]

[tool.pytest.ini_options]
asyncio_mode = "auto"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "W", "F", "I", "B", "C4", "UP"]

[tool.ruff.lint.isort]
known-first-party = ["sqlcipherui_api", "sqlcipherui_core"]
